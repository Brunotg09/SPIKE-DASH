name: spike_dash_app
description: "Arena de Reflexos e Ritmo - SPIKE DASH"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # --- GERENCIAMENTO DE ESTADO ---
  provider: ^6.1.1

  # --- BANCO RELACIONAL LOCAL (SQLite) ---
  sqflite: ^2.3.0
  path: ^1.8.3

  # --- BANCO NOSQL LOCAL (Hive) ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- FIREBASE (Nuvem) ---
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

  # --- GERADOR DE CODIGO HIVE ---
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
